services:
  server:
    build:
      context: .
      target: base
    ports:
      - "3000:3000"
    env_file:
      - ./apps/server/.env
    environment:
      - DATABASE_URL=file:/app/local.db
    volumes:
      - ./:/app
      - aer_node_modules:/app/node_modules
      - aer_server_node_modules:/app/apps/server/node_modules
      - ./local.db:/app/local.db
    command: ["sh", "-c", "bun install --frozen-lockfile && bun run --cwd /app/apps/server dev"]
    restart: always

  web:
    build:
      context: .
      target: base
      args:
        - VITE_SERVER_URL=http://localhost:3000
    ports:
      - "5713:5713"
    depends_on:
      - server
    volumes:
      - ./:/app
      - aer_node_modules:/app/node_modules
      - aer_web_node_modules:/app/apps/web/node_modules
    command: ["sh", "-c", "bun install --frozen-lockfile && bun run --cwd /app/apps/web dev -- --host 0.0.0.0 --port 5713"]
    restart: always

volumes:
  aer_node_modules:
  aer_server_node_modules:
  aer_web_node_modules:
